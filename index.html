<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SkinCare System</title>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.screen { display: none; }
.active { display: block; }

.container {
  background: #1e1e1e;
  padding: 20px;
  margin: 20px auto;
  width: 400px;
  border-radius: 10px;
}

button {
  margin: 10px;
  padding: 8px 15px;
  border: none;
  border-radius: 5px;
  background: #4caf50;
  color: white;
  cursor: pointer;
}

input, textarea {
  margin: 5px;
  padding: 5px;
  width: 90%;
}

.success {
  color: #4caf50;
  font-weight: bold;
}
</style>
</head>
<body>

<h1>✨ Skin Care Planner</h1>

<!-- PANTALLA 1 -->
<div id="screen1" class="screen active">
  <div class="container">
    <h3>Selecciona tus días</h3>

    <label><input type="checkbox" value="1"> Lunes</label><br>
    <label><input type="checkbox" value="2"> Martes</label><br>
    <label><input type="checkbox" value="3"> Miércoles</label><br>
    <label><input type="checkbox" value="4"> Jueves</label><br>
    <label><input type="checkbox" value="5"> Viernes</label><br>
    <label><input type="checkbox" value="6"> Sábado</label><br>
    <label><input type="checkbox" value="0"> Domingo</label><br>

    <button onclick="guardarDias()">Siguiente</button>
  </div>
</div>

<!-- PANTALLA 2 -->
<div id="screen2" class="screen">
  <div class="container">
    <h3 id="diaActualTitulo"></h3>

    <h4>Productos de Día</h4>
    <textarea id="productosDia"></textarea>

    <h4>Productos de Noche</h4>
    <textarea id="productosNoche"></textarea>

    <button onclick="guardarProductosDia()">Guardar Día</button>
  </div>
</div>

<!-- PANTALLA 3 -->
<div id="screen3" class="screen">
  <div class="container">
    <h3>Checklist de Hoy</h3>
    <div id="checklist"></div>
    <button onclick="guardarChecklist()">Guardar progreso</button>
    <p id="mensaje"></p>
  </div>
</div>

<script>

let diasSeleccionados = [];
let configuracion = {};
let indiceDia = 0;

const nombresDias = {
  "0":"Domingo",
  "1":"Lunes",
  "2":"Martes",
  "3":"Miércoles",
  "4":"Jueves",
  "5":"Viernes",
  "6":"Sábado"
};

function cambiarPantalla(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function guardarDias(){
  const checks = document.querySelectorAll("#screen1 input[type=checkbox]");
  diasSeleccionados = [];

  checks.forEach(c=>{
    if(c.checked) diasSeleccionados.push(c.value);
  });

  localStorage.setItem("diasSeleccionados", JSON.stringify(diasSeleccionados));
  indiceDia = 0;
  cambiarPantalla("screen2");
  mostrarConfiguracionDia();
}

function mostrarConfiguracionDia(){
  const dia = diasSeleccionados[indiceDia];
  document.getElementById("diaActualTitulo").innerText =
  "Configura " + nombresDias[dia];
}

function guardarProductosDia(){
  const dia = diasSeleccionados[indiceDia];

  configuracion[dia] = {
    dia: document.getElementById("productosDia").value.split("\n"),
    noche: document.getElementById("productosNoche").value.split("\n")
  };

  document.getElementById("productosDia").value="";
  document.getElementById("productosNoche").value="";

  indiceDia++;

  if(indiceDia < diasSeleccionados.length){
    mostrarConfiguracionDia();
  } else {
    localStorage.setItem("configuracion", JSON.stringify(configuracion));
    cambiarPantalla("screen3");
    cargarChecklistHoy();
  }
}

function cargarChecklistHoy(){
  const hoy = new Date().getDay().toString();
  const config = JSON.parse(localStorage.getItem("configuracion")||"{}");
  const cont = document.getElementById("checklist");
  cont.innerHTML="";

  if(!config[hoy]){
    cont.innerHTML="Hoy no tienes rutina programada.";
    return;
  }

  cont.innerHTML+="<h4>Rutina Día</h4>";
  config[hoy].dia.forEach(p=>{
    if(p.trim()!=="")
      cont.innerHTML+=`<label><input type="checkbox"> ${p}</label><br>`;
  });

  cont.innerHTML+="<h4>Rutina Noche</h4>";
  config[hoy].noche.forEach(p=>{
    if(p.trim()!=="")
      cont.innerHTML+=`<label><input type="checkbox"> ${p}</label><br>`;
  });
}

function guardarChecklist(){
  const checks = document.querySelectorAll("#checklist input[type=checkbox]");
  let completo=true;

  checks.forEach(c=>{
    if(!c.checked) completo=false;
  });

  if(completo){
    document.getElementById("mensaje").innerText =
    "✨ Disciplina silenciosa, resultados visibles.";
    document.getElementById("mensaje").classList.add("success");
  } else {
    document.getElementById("mensaje").innerText =
    "Aún no está completo.";
  }
}

if(localStorage.getItem("configuracion")){
  cambiarPantalla("screen3");
  cargarChecklistHoy();
}

</script>

</body>
</html>
